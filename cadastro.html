        <div class="form">
                <h1>Novo Usuário:</h1>
            <form action="" method="get">
                <div class="leftlabel">
                    <label for="usuario">Usuário:</label>
                    <input type="text" name="usuario" id="usuario" title="usuario" placeholder="João123" required>
                </div>

                <div class="leftlabel">
                    <label for="cpf">CPF:</label>
                    <input type="text" name="cpf" id="cpf" title="cpf" placeholder="12345678910" required>
                </div>

                <div class="leftlabel">
                    <label for="rg">RG:</label>
                    <input type="text" name="rg" id="rg" title="rg" placeholder="1234567890" required>
                </div>
                <div class="leftlabel">
                    <label for="nome">Nome completo:</label>
                    <input type="text" name="nome" id="nome" title="nome" placeholder="João Santos Silva" required>
                </div>

                <div class="leftlabel">  
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email" title="email" placeholder="joao@gmail.com" required>
                </div>
                
                <div class="short">
                    <div class="leftlabel">
                        <label for="estadoCivil">Estado Civil:</label>
                        <select id="estadoCivil" name="estadoCivil" required>
                            <option value="solteiro">Solteiro(a)</option>
                            <option value="casado">Casado(a)</option>
                            <option value="divorciado">Divorciado(a)</option>
                            <option value="viuvo">Viúvo(a)</option>
                        </select>
                    </div>

                    <div class="leftlabel">
                        <label for="nascimento">Data de nascimento:</label>
                        <input type="date" name="nascimento" id="nascimento" title="nascimento" required>
                    </div>
                </div>

                
            

                <div class="leftlabel">
                    <label for="endereco">Endereço Residencial:</label>
                    <input type="text" name="endereco" id="endereco" title="endereco" placeholder="Rua 15 de Setembro" required>
                </div>

                <div class="short">
                    <div class="leftlabel">
                        <label for="enderecoNum">Número:</label>
                        <input type="text" name="enderecoNum" id="enderecoNum" title="enderecoNum" placeholder="123" required>
                    </div>
                    <div class="leftlabel">
                        <label for="enderecoComplemento">Complemento: </label>
                        <input type="text" name="enderecoComplemento" id="enderecoComplemento" title="enderecoComplemento" placeholder="apt 1">
                    </div>

                </div>
                

                

                <div class="leftlabel">
                    <label for="bairro">Bairro:</label>
                    <input type="text" name="bairro" id="bairro" title="bairro" placeholder="Centro" required>
                </div>

                <div class="leftlabel">
                    <label for="cidade">Cidade:</label>
                    <input type="text" name="cidade" id="cidade" title="cidade" placeholder="Nova Petrópolis" required>
                </div>

                <div class="leftlabel">
                    <label for="cep">Primeiro nome:</label>
                    <input type="text" name="cep" id="cep" title="cep" required>
                </div>

                <div class="leftlabel">
                    <label class="optional" for="trabalho">Local de Trabalho:</label>
                    <input type="text" name="trabalho" id="trabalho" title="trabalho" >
                </div>

                <div class="leftlabel">
                    <label class="optional" for="trabalhoEndereco">Endereço Comercial:</label>
                    <input type="text" name="trabalhoEndereco" id="trabalhoEndereco" title="trabalhoEndereco" placeholder="Rua 15 de Setembro">
                </div>

                <div class="leftlabel">
                    <label class="optional" for="trabalhoNum">Número:</label>
                    <input type="number" name="trabalhoNum" id="trabalhoNum" title="trabalhoNum" placeholder="123">
                </div>

                <div class="leftlabel">
                    <label  class="optional" for="trabalhoComplemento">Complemento:</label>
                    <input type="text" name="trabalhoComplemento" id="trabalhoComplemento" title="trabalhoComplemento" placeholder="apt 1">
                </div>

                <div class="leftlabel">
                    <label class="optional" for="trabalhoBairro">Bairro:</label>
                    <input type="text" name="trabalhoBairro" id="trabalhoBairro" title="trabalhoBairro" placeholder="Centro">
                </div>
